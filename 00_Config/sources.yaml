# EdgeAI Observatory — Monitored Sources Configuration
#
# This file is the single source of truth for what the Observatory monitors.
# Edit it directly to add, remove, or disable sources — no need to touch
# project instructions. Each entry should be self-explanatory; "status:
# active" sources are checked during weekly/monthly monitoring cycles,
# "status: paused" ones are kept for reference but skipped.
#
# last_checked: the date (YYYY-MM-DD) this source last actually contributed
# to a weekly digest or monthly report — not just "in scope." Set to null
# when there is no record of it ever being checked; do not guess a date.
# Update it whenever a digest/report cites this source.

digital_libraries:
  - name: arXiv
    url: https://arxiv.org
    categories: [cs.LG, cs.AR, cs.DC, eess.SP]
    access: open
    status: active
    notes: "Primary source for preprints; check daily/weekly listings on relevant categories."
    last_checked: 2026-06-29

  - name: IEEE Xplore
    url: https://ieeexplore.ieee.org
    access: institutional
    access_notes: "Reachable via University of Genoa (unige.it) institutional access. Use the Claude in Chrome extension on Ricky's browser while he is on the campus network/VPN/proxy to navigate and extract paper text directly."
    status: active
    last_checked: null

  - name: ACM Digital Library
    url: https://dl.acm.org
    access: institutional
    access_notes: "Same as IEEE Xplore — use Claude in Chrome while on unige.it institutional access."
    status: active
    last_checked: null

  - name: Google Scholar
    url: https://scholar.google.com
    access: open (aggregator, links may lead to paywalled publishers)
    access_notes: "No official API — use Claude in Chrome to run searches and read result pages. Useful as a cross-publisher aggregator: finds papers not indexed on arXiv, surfaces citation counts to gauge influence, and often links directly to a free PDF (publisher page, author repository, or institutional repo) even for papers behind a paywall elsewhere. Use sparingly and avoid rapid automated querying, since Google Scholar's terms discourage scripted scraping."
    status: active
    last_checked: null

